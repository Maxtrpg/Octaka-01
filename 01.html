<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬茲提卡 - 鷹豹之憩客棧</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- 基礎設定 --- */
        :root { --gold: #d4af37; --bg-dark: rgba(15, 12, 10, 0.9); --text: #e0d0b0; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Noto Serif TC', serif; 
            display: flex; justify-content: center; align-items: center; 
            
            /* --- 通用外部背景設定 --- */
            background-color: #0a0a0a; 
            background-image: url('map/cover.webp'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
        }

        /* --- 固定的 1200x720 主框架 --- */
        #game-window {
            width: 1200px; height: 720px; background: #000;
            border: 3px solid var(--gold); border-radius: 8px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        /* --- 頂部總導航列 --- */
        #master-nav {
            height: 60px; background: #1a1511; border-bottom: 2px solid var(--gold);
            display: flex; align-items: center; padding: 0 30px; gap: 20px; z-index: 100; flex-shrink: 0;
        }
        .nav-brand { color: var(--gold); font-family: 'Cinzel', serif; font-size: 1.4rem; margin-right: auto; font-weight: bold; letter-spacing: 2px; }
        .nav-btn {
            text-decoration: none; border: 1px solid transparent; color: var(--text);
            font-size: 1.1rem; padding: 6px 15px; cursor: pointer; transition: 0.3s; font-family: 'Noto Serif TC', serif;
        }
        .nav-btn:hover { border-bottom: 1px solid var(--gold); color: #fff; }
        .nav-btn.active { border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.1); border-radius: 4px; color: var(--gold); }

        /* --- 主畫布區 --- */
        #viewer-area { flex: 1; position: relative; width: 100%; height: 100%; overflow: hidden; }
        .scene-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('map/engle.webp'); background-size: cover; background-position: center; filter: brightness(0.5); z-index: 0; transform: scale(1.02); }
        .game-ui { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; justify-content: space-between; }
        
        /* === 左側：動態展示區 === */
        .character-display-zone { position: relative; flex: 1; height: 100%; pointer-events: none; }
        
        /* 立繪基礎設定 (長寬位置交由 JS 動態控制) */
        .character-sprite { 
            position: absolute; 
            opacity: 0; transform: translateX(-20px); transition: 0.5s ease; 
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8)); z-index: 1; 
        }
        .character-sprite.active { opacity: 1; transform: translateX(0); }
        
        /* 故事視窗 (加入自適應高度與滾動條防爆框) */
        .npc-story-overlay { 
            position: absolute; right: 30px; bottom: 40px; 
            width: 340px; max-height: 520px; overflow-y: auto;
            background: rgba(10, 8, 6, 0.95); 
            border: 1px solid var(--gold); padding: 25px; 
            color: var(--text); border-radius: 4px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.9), inset 0 0 15px rgba(212, 175, 55, 0.1); 
            opacity: 0; transform: translateX(20px); transition: all 0.4s ease; 
            text-align: justify; line-height: 1.7; font-size: 0.95rem; pointer-events: auto; z-index: 2; 
        }
        .npc-story-overlay::-webkit-scrollbar { width: 4px; }
        .npc-story-overlay::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.4); }
        .npc-story-overlay.active { opacity: 1; transform: translateX(0); }
        .npc-story-overlay strong { color: var(--gold); font-size: 1.2rem; font-family: 'Cinzel', 'Noto Serif TC', serif; display: block; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 8px; margin-bottom: 12px; letter-spacing: 1px; }

        /* === 右側：資訊面板 (寬度 400px) === */
        .info-panel { width: 400px; height: 100%; background: var(--bg-dark); border-left: 2px solid var(--gold); display: flex; box-shadow: -15px 0 40px rgba(0,0,0,0.9); flex-shrink: 0; z-index: 3;}
        .bookmarks { width: 50px; height: 100%; background: #2c251d; display: flex; flex-direction: column; border-right: 1px solid var(--gold); }
        .bookmark-btn { writing-mode: vertical-lr; padding: 20px 10px; color: var(--gold); cursor: pointer; border-bottom: 1px solid rgba(212, 175, 55, 0.2); opacity: 0.7; letter-spacing: 3px; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
        .bookmark-btn:hover { opacity: 1; background: rgba(212, 175, 55, 0.1); }
        .bookmark-btn.active { opacity: 1; background: rgba(212, 175, 55, 0.2); border-left: 4px solid var(--gold); } 
        
        .scroll-content { flex: 1; padding: 20px; overflow-y: auto; color: var(--text); line-height: 1.8; }
        .scroll-content::-webkit-scrollbar { width: 6px; }
        .scroll-content::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); border-radius: 3px; }
        
        .info-panel h2 { font-family: 'Cinzel', serif; color: var(--gold); border-bottom: 1px solid var(--gold); margin: 0 0 15px 0; font-size: 1.6rem; }
        .section { display: none; animation: fadeInPage 0.4s ease; }
        .section.active { display: block; }
        
        .interaction-card { background: rgba(255,255,255,0.03); padding: 12px; border: 1px solid rgba(212, 175, 55, 0.1); margin-bottom: 12px; cursor: pointer; transition: 0.3s; }
        .interaction-card:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);}
        .interaction-card strong { color: var(--gold); display: block; margin-bottom: 5px; font-size: 1.05rem;}
        .lore-desc { font-size: 1rem; text-align: justify; margin-bottom: 20px; padding-top: 10px; border-top: 1px dashed rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>

<div id="game-window">
    <nav id="master-nav">
        <div class="nav-brand">黑曜黎明：奧克塔卡之誓冒險札記</div>
        <a href="index.html" class="nav-btn active">回地圖</a>
        <a href="item.html" class="nav-btn">獲得物品</a> 
        <a href="journals.html" class="nav-btn">冒險筆記</a>
    </nav>

    <main id="viewer-area">
        <div class="scene-background"></div>
        <div class="game-ui">
            <div class="character-display-zone">
                <img id="npc-sprite" class="character-sprite" src="" alt="">
                <div id="story-box" class="npc-story-overlay"></div>
            </div>

            <div class="info-panel">
                <div class="bookmarks">
                    <div class="bookmark-btn active" onclick="showTab('intro')">客棧</div>
                    <div class="bookmark-btn" onclick="showTab('members')">客棧成員</div>
                </div>

                <div class="scroll-content">
                    <div id="intro" class="section active">
                        <h2>鷹豹之憩客棧</h2>
                        <div class="lore-desc">
                            <p>  這座兼具酒館與客棧功能的堅固石造建築，是奧克塔卡城內許多人的歇息之處。這裡瀰漫著烤玉米的香氣與龍舌蘭酒的醇香，聚集著各路探險者、衛兵與收集情報的眼線。</p>
                            <p>  然而，在歡樂的表象背後，店主一家的眼神中卻流露著對東邊內克薩爾山谷那揮之不去的陰霾與驚恐……</p>
                        </div>
                    </div>

                    <div id="members" class="section">
                        <h2>當地居民</h2>
                        
                        <div class="interaction-card" onclick="loadNpc('takamt')">
                            <strong>特卡姆特</strong><span>客棧老闆</span>
                        </div>
                        
                        <div class="interaction-card" onclick="loadNpc('xiomara')">
                            <strong>老闆娘(🔒)</strong><span>客棧老闆娘</span>
                        </div>

                        <div class="interaction-card" onclick="loadNpc('tizoc')">
                            <strong>提索克</strong><span>客棧老闆大兒子</span>
                        </div>

                        <div class="interaction-card" onclick="loadNpc('zyanya')">
                            <strong>席安雅</strong><span>客棧老闆小女兒</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // --- 集中管理劇本文字與立繪路徑，同步最新動態尺寸架構 ---
    const npcData = {
        takamt: {
            name: "特卡姆特",
            title: "客棧老闆",
            img: "npc/takamt.webp",
            isHorizontal: false, // 是否為橫向 CG
            bg: null,            // 是否有專屬背景
            story: "退役的豹騎士，曾經身經百戰，身上有許多舊傷。他負責客棧的酒水與管理。<br><br><strong>【情報】</strong>🔒（未曾深入交談）"
        },
        xiomara: {
            name: "老闆娘 (🔒)",
            title: "客棧老闆娘",
            img: "npc/xiomara.webp",
            isHorizontal: false,
            bg: null,
            story: "🔒"
        },
        tizoc: {
            name: "提索克",
            title: "客棧老闆大兒子",
            img: "npc/tizoc.webp",
            isHorizontal: false,
            bg: null,
            story: "負責跑腿、搬運貨物與打掃的 17 歲青少年。<br><br><strong>【情報】</strong>🔒（未曾深入交談）"
        },
        zyanya: {
            name: "席安雅",
            title: "客棧老闆小女兒",
            img: "npc/zyanya.webp",
            isHorizontal: false,
            bg: null,
            story: "在父母身邊幫忙的 11 歲小女孩。眼神空洞地看著火爐，抱著一個用草編織的無臉娃娃。<br><br><strong>【情報】</strong>常常說一些旁人摸不著頭緒的話語，甚至有些滲人。<br>「晚上睡覺的時候，我聽到地底下有人在哭。地下有很多人在哭……每天晚上都在哭。」<br>「如果進到霧裡面，看到長著兩顆頭的小鳥，千萬不要聽牠唱歌。牠唱的不是歌，是在叫地下的東西起床。」<br>「……你的影子邊緣，有點發霉了。就像山谷裡的那些樹一樣。」"
        }
    };

    // 記錄最初始的場景背景
    let defaultSceneBg = ""; 
    window.addEventListener('DOMContentLoaded', () => {
        const bgEl = document.querySelector('.scene-background');
        if (bgEl) {
            defaultSceneBg = window.getComputedStyle(bgEl).backgroundImage.replace(/url\(['"]?(.*?)['"]?\)/i, '$1');
        }
    });

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.bookmark-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        
        document.getElementById('npc-sprite').classList.remove('active');
        document.getElementById('story-box').classList.remove('active');

        // 切換分頁時，自動切回原本的預設背景
        const sceneBg = document.querySelector('.scene-background');
        if(sceneBg && defaultSceneBg) {
            sceneBg.style.backgroundImage = `url('${defaultSceneBg}')`;
        }
    }

    function loadNpc(key) {
        const sprite = document.getElementById('npc-sprite');
        const storyBox = document.getElementById('story-box');
        const sceneBg = document.querySelector('.scene-background'); 
        const data = npcData[key];
        
        sprite.classList.remove('active');
        storyBox.classList.remove('active');
        
        setTimeout(() => {
            sprite.src = data.img;
            
            // 背景切換邏輯
            if (sceneBg) {
                if (data.bg) {
                    sceneBg.style.backgroundImage = `url('${data.bg}')`;
                } else if (defaultSceneBg) {
                    sceneBg.style.backgroundImage = `url('${defaultSceneBg}')`;
                }
            }

            // 【動態立繪尺寸控制】
            if (data.isHorizontal) {
                // 全版 CG 模式
                sprite.style.maxWidth = '950px';
                sprite.style.width = '950px';
                sprite.style.height = '100%';
                sprite.style.left = '0px';
                sprite.style.bottom = '0px';
                sprite.style.objectFit = 'cover';
                sprite.style.objectPosition = '85% center';
                sprite.style.zIndex = '0';
            } else {
                // 標準直向立繪控制 (放大版：高度撐滿，寬度上限放寬)
                sprite.style.maxWidth = '550px';
                sprite.style.width = 'auto';
                sprite.style.height = '100%';
                sprite.style.left = '40px';
                sprite.style.bottom = '0px';
                sprite.style.objectFit = 'contain';
                sprite.style.objectPosition = 'bottom left';
                sprite.style.zIndex = '1';
            }
            
            storyBox.innerHTML = `<strong>${data.name} <span style="font-size:0.85rem; color:#888; font-family:'Noto Serif TC';">| ${data.title}</span></strong>${data.story}`;
            sprite.classList.add('active');
            storyBox.classList.add('active');
        }, 250);
    }
</script>
</body>
</html>
